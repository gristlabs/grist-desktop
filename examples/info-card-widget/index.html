<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Use Grist theme variables when available, with sensible fallbacks */
  :root {
    --card-bg: var(--grist-theme-card-compact-widget-bg, #ffffff);
    --card-fg: var(--grist-theme-text, #262633);
    --card-muted: var(--grist-theme-text-light, #929299);
    --card-accent: var(--grist-theme-cursor, #16b378);
    --card-border: var(--grist-theme-widget-border, #e8e8e8);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--card-bg);
    color: var(--card-fg);
    padding: 16px;
  }

  .placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 120px;
    color: var(--card-muted);
    font-style: italic;
  }

  .card {
    border: 1px solid var(--card-border);
    border-radius: 8px;
    overflow: hidden;
  }

  .card-header {
    padding: 16px 20px;
    border-bottom: 2px solid var(--card-accent);
  }

  .card-header h1 {
    font-size: 1.4em;
    font-weight: 600;
    line-height: 1.3;
  }

  .card-header .subtitle {
    font-size: 0.9em;
    color: var(--card-muted);
    margin-top: 2px;
  }

  .card-body {
    padding: 16px 20px;
  }

  .field {
    display: flex;
    padding: 6px 0;
    border-bottom: 1px solid var(--card-border);
  }

  .field:last-child { border-bottom: none; }

  .field-label {
    flex: 0 0 120px;
    font-size: 0.85em;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--card-muted);
    padding-top: 2px;
  }

  .field-value {
    flex: 1;
    font-size: 0.95em;
    word-break: break-word;
  }

  .stat-row {
    display: flex;
    gap: 12px;
    margin-top: 12px;
  }

  .stat {
    flex: 1;
    background: color-mix(in srgb, var(--card-accent) 8%, var(--card-bg));
    border-radius: 6px;
    padding: 10px 12px;
    text-align: center;
  }

  .stat-value {
    font-size: 1.3em;
    font-weight: 700;
    color: var(--card-accent);
  }

  .stat-label {
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--card-muted);
    margin-top: 2px;
  }

  /* Options panel (toggled via the widget config button) */
  .options-panel {
    display: none;
    padding: 16px;
  }

  .options-panel.open { display: block; }

  .options-panel label {
    display: block;
    font-size: 0.85em;
    font-weight: 600;
    color: var(--card-muted);
    margin-bottom: 4px;
  }

  .options-panel select, .options-panel input {
    width: 100%;
    padding: 6px 8px;
    margin-bottom: 12px;
    border: 1px solid var(--card-border);
    border-radius: 4px;
    font-size: 0.9em;
    background: var(--card-bg);
    color: var(--card-fg);
  }
</style>

<!--
  Load the Grist plugin API.
  For fully offline use, download this file into your plugin folder
  and change the src to "./grist-plugin-api.js".
-->
<script src="grist-plugin-api.js"></script>
</head>
<body>

<div id="options-panel" class="options-panel">
  <label for="accent-color">Accent color</label>
  <select id="accent-color">
    <option value="">Grist default</option>
    <option value="#16b378">Green</option>
    <option value="#4e84d6">Blue</option>
    <option value="#d94e4e">Red</option>
    <option value="#d6984e">Orange</option>
    <option value="#9b59b6">Purple</option>
  </select>
  <label for="num-format">Number format</label>
  <select id="num-format">
    <option value="compact">Compact (1.2M)</option>
    <option value="full">Full (1,200,000)</option>
  </select>
</div>

<div id="content">
  <div class="placeholder">Select a row to see its card.</div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────

let currentOptions = { accentColor: '', numFormat: 'compact' };

// ── Options helpers ────────────────────────────────────────────────

function applyAccentColor(color) {
  if (color) {
    document.documentElement.style.setProperty('--card-accent', color);
  } else {
    document.documentElement.style.removeProperty('--card-accent');
  }
}

function formatNumber(n, style) {
  if (n === null || n === undefined || n === '') return '\u2014';
  n = Number(n);
  if (isNaN(n)) return '\u2014';
  if (style === 'compact') {
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toLocaleString();
  }
  return n.toLocaleString();
}

function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function val(v) {
  if (v === null || v === undefined || v === '') return '\u2014';
  return escapeHtml(String(v));
}

// ── Options panel wiring ───────────────────────────────────────────

const accentSelect = document.getElementById('accent-color');
const numFormatSelect = document.getElementById('num-format');

accentSelect.addEventListener('change', () => {
  currentOptions.accentColor = accentSelect.value;
  applyAccentColor(accentSelect.value);
  grist.setOption('accentColor', accentSelect.value);
});

numFormatSelect.addEventListener('change', () => {
  currentOptions.numFormat = numFormatSelect.value;
  grist.setOption('numFormat', numFormatSelect.value);
  // Re-render with the current record if we have one
  if (lastRecord) renderCard(lastRecord);
});

// ── Rendering ──────────────────────────────────────────────────────

let lastRecord = null;

function renderCard(record) {
  lastRecord = record;

  // Use mapped column names if available, otherwise fall back to
  // the original column names.
  const mapped = grist.mapColumnNames(record);
  const r = mapped || record;

  const title    = r.Title    || '';
  const subtitle = r.Subtitle || '';
  const detail1  = r.Detail_1;
  const detail2  = r.Detail_2;
  const number1  = r.Number_1;
  const number2  = r.Number_2;

  const fmt = currentOptions.numFormat || 'compact';

  // Build up detail fields (skip unmapped ones)
  let fieldsHtml = '';
  if (detail1 !== undefined) {
    fieldsHtml += `
      <div class="field">
        <span class="field-label">Detail 1</span>
        <span class="field-value">${val(detail1)}</span>
      </div>`;
  }
  if (detail2 !== undefined) {
    fieldsHtml += `
      <div class="field">
        <span class="field-label">Detail 2</span>
        <span class="field-value">${val(detail2)}</span>
      </div>`;
  }

  // Build stat boxes for numeric columns
  let statsHtml = '';
  if (number1 !== undefined || number2 !== undefined) {
    statsHtml = '<div class="stat-row">';
    if (number1 !== undefined) {
      statsHtml += `
        <div class="stat">
          <div class="stat-value">${formatNumber(number1, fmt)}</div>
          <div class="stat-label">Number 1</div>
        </div>`;
    }
    if (number2 !== undefined) {
      statsHtml += `
        <div class="stat">
          <div class="stat-value">${formatNumber(number2, fmt)}</div>
          <div class="stat-label">Number 2</div>
        </div>`;
    }
    statsHtml += '</div>';
  }

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        <h1>${val(title)}</h1>
        ${subtitle ? '<div class="subtitle">' + val(subtitle) + '</div>' : ''}
      </div>
      <div class="card-body">
        ${fieldsHtml}
        ${statsHtml}
      </div>
    </div>`;
}

// ── Grist integration ──────────────────────────────────────────────

// 1. Restore saved options when the widget loads.
grist.onOptions((options) => {
  if (options) {
    currentOptions = { ...currentOptions, ...options };
    accentSelect.value = currentOptions.accentColor || '';
    numFormatSelect.value = currentOptions.numFormat || 'compact';
    applyAccentColor(currentOptions.accentColor);
  }
});

// 2. Respond to row selection changes.
grist.onRecord((record, mappings) => {
  if (!record) {
    document.getElementById('content').innerHTML =
      '<div class="placeholder">Select a row to see its card.</div>';
    return;
  }
  renderCard(record);
});

// 3. Show the options panel when the user clicks the config button.
function toggleOptions() {
  document.getElementById('options-panel').classList.toggle('open');
}

// 4. Declare the widget ready with column mapping and config support.
grist.ready({
  requiredAccess: 'read table',
  columns: [
    { name: "Title", type: "Any", description: "Main heading (e.g. Name)" },
    { name: "Subtitle", type: "Any", description: "Secondary line", optional: true },
    { name: "Detail_1", type: "Any", description: "First detail field", optional: true },
    { name: "Detail_2", type: "Any", description: "Second detail field", optional: true },
    { name: "Number_1", type: "Numeric", description: "First stat", optional: true },
    { name: "Number_2", type: "Numeric", description: "Second stat", optional: true },
  ],
  onEditOptions: toggleOptions,
});
</script>
</body>
</html>
